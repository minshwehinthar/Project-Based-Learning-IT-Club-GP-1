<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
  <div class="space-y-4 p-8">
  <!-- FAQ Item -->
  <div class="group border-b border-gray-200 pb-4 cursor-pointer">
    <!-- Question -->
    <h3 class="text-lg font-medium text-gray-900 group-hover:text-blue-600 transition-colors">
      How fast is the delivery?
    </h3>
    
    <!-- Answer (Hidden by default, shown on group hover) -->
    <p class="hidden group-active:block mt-2 text-gray-600">
      Our standard delivery takes 3-5 business days. Express shipping is available for overnight arrival!
    </p>
  </div>
</div>
</body>
</html>
