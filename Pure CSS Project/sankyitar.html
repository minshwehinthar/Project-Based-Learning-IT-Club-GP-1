<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Padauk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
      }

      .home{
        background-color: red;
        width: 500px;
        height: 500px;
        margin: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .room-1{
        background-color: green;
        width: 100px;
        height: 100px;
        position: relative;
      }

      .room-2{
        background-color: blue;
        width: 100px;
        height: 100px;
      }

      .room-3{
        background-color: yellow;
        width: 100px;
        height: 100px;
      }

      .fan{
        width: 20px;
        height: 20px;
        position: absolute;
        top: 20px;
        left:20px;
      }
    </style>

  </head>
  <body>
    <div class="home">
      <div class="room-1">
        1
        <p class="fan"><i class="fa-solid fa-fan"></i></p>
      </div>
      <div class="room-2">2</div>
      <div class="room-3">3
      </div>
    </div>
  </body>
</html>
