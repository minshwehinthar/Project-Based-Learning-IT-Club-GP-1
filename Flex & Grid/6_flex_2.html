<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Playground</title>
    <style>
        .container {
            display: flex;
            
            /* --- HORIZONTAL AXIS --- */
            justify-content: space-evenly; 

            /* --- VERTICAL AXIS --- */
            align-items: center; 


            height: 400px;
            width: 100%;
            max-width: 600px;
            background-color: #2c3e50;
            border: 5px solid #34495e;
            border-radius: 15px;
            margin: 50px auto;
        }

        .box {
            width: 80px;
            height: 80px;
            background-color: #e74c3c;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .box:nth-child(2) { background-color: #f1c40f; }
        .box:nth-child(3) { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
