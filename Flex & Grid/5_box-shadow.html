<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body{
            background: #f0f0f0;
            margin: 0;
            height: 100vh;
            position: relative;
        }

        .shadow-box{
            position : absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 20px;
            box-shadow: -15px -15px 20px blue;
        }
    </style>
<body>
    <div class="shadow-box">

    </div>
</body>
</html>
